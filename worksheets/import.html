<h1>Worksheet Importer</h1>

<textarea
id="worksheetInput"
rows="20"
style="width:100%;">
</textarea>

<br><br>

<button id="btnPreview">
Preview Worksheet
</button>

<hr>

<div
    id="previewArea"
    style="
        background:white;
        color:black;
        padding:20px;
        margin-top:20px;
        border:1px solid #ccc;
        border-radius:10px;
        min-height:300px;
    ">
</div>

<script>

document
.getElementById("btnPreview")
.addEventListener("click", () => {

    const content =
        document.getElementById("worksheetInput").value;

    document
        .getElementById("previewArea")
        .innerHTML = content;

});

</script>
